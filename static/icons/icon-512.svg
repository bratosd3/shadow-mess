<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </linearGradient>
    <radialGradient id="gl" cx=".5" cy=".88" r=".35">
      <stop offset="0%" stop-color="#4f7cff" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#4f7cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ground glow under sword -->
  <ellipse cx="256" cy="395" rx="90" ry="14" fill="url(#gl)"/>

  <!-- ═══ SWORD — centered, in front of warrior ═══ -->
  <!-- Blade — straight, clean -->
  <rect x="252" y="265" width="8" height="130" rx="2" fill="#fff" opacity=".9"/>
  <!-- Blade edge shine -->
  <rect x="255" y="270" width="2" height="120" rx="1" fill="#fff" opacity=".3"/>
  <!-- Crossguard — simple horizontal bar -->
  <rect x="232" y="258" width="48" height="10" rx="5" fill="#fff" opacity=".25"/>
  <!-- Grip -->
  <rect x="252" y="240" width="8" height="22" rx="3" fill="#fff" opacity=".5"/>
  <!-- Pommel — small circle -->
  <circle cx="256" cy="235" r="7" fill="#fff" opacity=".35"/>

  <!-- ═══ WARRIOR — standing behind sword, hands on pommel ═══ -->
  <g stroke="#fff" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="256" cy="118" r="28" stroke-width="8" opacity=".85"/>
    <!-- Neck -->
    <line x1="256" y1="146" x2="256" y2="158" stroke-width="8" opacity=".7"/>
    <!-- Torso -->
    <line x1="256" y1="158" x2="256" y2="260" stroke-width="9" opacity=".7"/>
    <!-- Shoulders -->
    <line x1="218" y1="178" x2="294" y2="178" stroke-width="9" opacity=".7"/>
    <!-- Left arm → elbow → hand on pommel -->
    <line x1="218" y1="178" x2="208" y2="210" stroke-width="8" opacity=".65"/>
    <line x1="208" y1="210" x2="240" y2="237" stroke-width="8" opacity=".65"/>
    <!-- Right arm → elbow → hand on pommel -->
    <line x1="294" y1="178" x2="304" y2="210" stroke-width="8" opacity=".65"/>
    <line x1="304" y1="210" x2="272" y2="237" stroke-width="8" opacity=".65"/>
    <!-- Left leg -->
    <line x1="256" y1="260" x2="228" y2="330" stroke-width="9" opacity=".6"/>
    <line x1="228" y1="330" x2="222" y2="395" stroke-width="8" opacity=".55"/>
    <!-- Right leg -->
    <line x1="256" y1="260" x2="284" y2="330" stroke-width="9" opacity=".6"/>
    <line x1="284" y1="330" x2="290" y2="395" stroke-width="8" opacity=".55"/>
  </g>
</svg>
