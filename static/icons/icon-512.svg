<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </linearGradient>
    <linearGradient id="bl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#fff" stop-opacity=".4"/>
    </linearGradient>
    <radialGradient id="gl" cx=".5" cy=".85" r=".5">
      <stop offset="0%" stop-color="#4f7cff" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#4f7cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ground glow -->
  <ellipse cx="256" cy="400" rx="100" ry="18" fill="url(#gl)"/>

  <!-- ── Warrior standing, both hands on sword pommel ── -->
  <g stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="256" cy="118" r="26" fill="#fff" fill-opacity=".12"/>
    <!-- Neck -->
    <line x1="256" y1="144" x2="256" y2="155"/>
    <!-- Body / torso -->
    <line x1="256" y1="155" x2="256" y2="268"/>
    <!-- Left leg -->
    <line x1="256" y1="268" x2="224" y2="340"/>
    <line x1="224" y1="340" x2="218" y2="395"/>
    <!-- Right leg -->
    <line x1="256" y1="268" x2="288" y2="340"/>
    <line x1="288" y1="340" x2="294" y2="395"/>
    <!-- Shoulders -->
    <line x1="222" y1="178" x2="290" y2="178"/>
    <!-- Left arm → goes to sword pommel -->
    <line x1="222" y1="178" x2="202" y2="220"/>
    <line x1="202" y1="220" x2="215" y2="258"/>
    <!-- Right arm → goes to sword pommel -->
    <line x1="290" y1="178" x2="308" y2="218"/>
    <line x1="308" y1="218" x2="290" y2="255"/>
  </g>

  <!-- ── Sword — thrust into ground, centered ── -->
  <!-- Blade — vertical, tip into ground -->
  <line x1="253" y1="290" x2="253" y2="400" stroke="url(#bl)" stroke-width="6" stroke-linecap="round"/>
  <!-- Blade edge highlight -->
  <line x1="253" y1="295" x2="253" y2="395" stroke="#fff" stroke-width="2" opacity=".2"/>
  <!-- Crossguard — horizontal, wider, decorative -->
  <path d="M220 284 Q225 278 253 278 Q281 278 286 284 L290 290 Q281 294 253 294 Q225 294 216 290 Z"
        fill="#fff" fill-opacity=".18" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
  <!-- Grip -->
  <line x1="253" y1="268" x2="253" y2="280" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity=".6"/>
  <!-- Pommel — diamond shape -->
  <path d="M253 254 L261 262 L253 270 L245 262 Z" fill="#fff" fill-opacity=".3" stroke="#fff" stroke-width="2.5"/>

  <!-- Ground crack lines -->
  <line x1="253" y1="400" x2="240" y2="410" stroke="#fff" stroke-width="2" opacity=".15" stroke-linecap="round"/>
  <line x1="253" y1="400" x2="268" y2="412" stroke="#fff" stroke-width="2" opacity=".12" stroke-linecap="round"/>
  <line x1="253" y1="400" x2="250" y2="414" stroke="#fff" stroke-width="1.5" opacity=".1" stroke-linecap="round"/>

  <!-- Cape / cloak accent (simple flowing lines from shoulders) -->
  <path d="M222 178 Q200 220 195 290 Q192 330 200 370" stroke="#fff" stroke-width="3" fill="none" opacity=".12" stroke-linecap="round"/>
  <path d="M290 178 Q312 220 317 290 Q320 330 312 370" stroke="#fff" stroke-width="3" fill="none" opacity=".12" stroke-linecap="round"/>
</svg>
