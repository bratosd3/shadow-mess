<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </linearGradient>
    <linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g transform="translate(256,256) scale(1.15) translate(-256,-256)">
  <!-- ── Kneeling defender (right) ── -->
  <g stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="330" cy="168" r="22" fill="#fff" fill-opacity=".12"/>
    <!-- Body — leaning forward -->
    <line x1="330" y1="190" x2="322" y2="262"/>
    <!-- Right leg — kneeling, knee on ground -->
    <line x1="322" y1="262" x2="355" y2="305"/>
    <line x1="355" y1="305" x2="355" y2="350"/>
    <!-- Left leg — bent forward, foot on ground -->
    <line x1="322" y1="262" x2="290" y2="310"/>
    <line x1="290" y1="310" x2="295" y2="350"/>
    <!-- Ground line (knee) -->
    <line x1="348" y1="350" x2="362" y2="350" stroke-width="6" opacity=".3"/>
    <!-- Arms — both gripping behind shield -->
    <line x1="322" y1="218" x2="295" y2="240"/>
    <line x1="322" y1="218" x2="298" y2="265"/>
  </g>

  <!-- Shield — large, covers kneeling figure -->
  <path d="M278 178 Q260 178 258 200 L254 296 Q256 342 288 360 Q296 364 300 364 Q304 364 312 360 Q344 342 346 296 L342 200 Q340 178 322 178 Z" 
        fill="url(#sh)" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
  <!-- Shield center ridge -->
  <line x1="300" y1="188" x2="300" y2="352" stroke="#fff" stroke-width="3" opacity=".25"/>
  <!-- Shield horizontal band -->
  <line x1="262" y1="268" x2="338" y2="268" stroke="#fff" stroke-width="3" opacity=".2"/>

  <!-- ── Standing attacker (left) ── -->
  <g stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="175" cy="138" r="22" fill="#fff" fill-opacity=".12"/>
    <!-- Body -->
    <line x1="175" y1="160" x2="175" y2="275"/>
    <!-- Left leg — wide stance -->
    <line x1="175" y1="275" x2="148" y2="350"/>
    <!-- Right leg — forward lunge -->
    <line x1="175" y1="275" x2="210" y2="350"/>
    <!-- Rear arm (left) on hilt -->
    <line x1="175" y1="205" x2="198" y2="230"/>
    <!-- Front arm (right) thrusting -->
    <line x1="175" y1="200" x2="215" y2="225"/>
    <line x1="215" y1="225" x2="245" y2="248"/>
  </g>

  <!-- Sword — blade thrusts into shield -->
  <line x1="238" y1="242" x2="280" y2="264" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <!-- Blade tip (hits shield) -->
  <line x1="275" y1="262" x2="288" y2="268" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity=".8"/>
  <!-- Crossguard -->
  <line x1="232" y1="250" x2="244" y2="234" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="200" cy="232" r="4" fill="#fff" opacity=".4"/>
  <!-- Impact sparks -->
  <line x1="284" y1="260" x2="292" y2="252" stroke="#fff" stroke-width="3" opacity=".35"/>
  <line x1="286" y1="270" x2="296" y2="270" stroke="#fff" stroke-width="3" opacity=".25"/>
  <line x1="282" y1="274" x2="290" y2="282" stroke="#fff" stroke-width="3" opacity=".2"/>
  </g>
</svg>
