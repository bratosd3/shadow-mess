# ═══════════════════════════════════════════════════════════
# Shadow Mess — Auto Deploy to Render
# Триггер: push в main → Render автоматически деплоит
# ═══════════════════════════════════════════════════════════
name: Deploy Shadow Mess

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check server starts
        run: |
          timeout 10 node server.js &
          sleep 5
          curl -f http://localhost:5000/ || exit 1
          kill %1 2>/dev/null || true
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        continue-on-error: true

      - name: Validate static files
        run: |
          test -f static/index.html && echo "✅ index.html OK"
          test -f static/js/app.js && echo "✅ app.js OK"
          test -f static/css/style.css && echo "✅ style.css OK"
          test -f server.js && echo "✅ server.js OK"
          test -f package.json && echo "✅ package.json OK"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "✅ Render deploy triggered"
          else
            echo "ℹ️ RENDER_DEPLOY_HOOK not set — Render will auto-deploy from GitHub connection"
          fi
